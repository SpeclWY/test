<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Terminology Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .stats {
            background: #f8f9fa;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
            font-weight: bold;
            font-size: 1.2em;
        }
        .score-box, .q-counter {
            background: #3498db;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
        }
        .main {
            padding: 30px 25px;
        }
        .question-text {
            font-size: 1.3em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 25px;
            line-height: 1.5;
            background: #f1f2f6;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #3498db;
        }
        .options-area {
            margin: 20px 0;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            margin: 10px 0;
            background: #f1f2f6;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 1.1em;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover {
            background: #e2e6ea;
            transform: translateX(5px);
        }
        .option-btn.selected {
            border-color: #3498db;
            background: #e8f4fd;
        }
        .option-btn.correct {
            border-color: #27ae60;
            background: #d5f4e6;
        }
        .option-btn.wrong {
            border-color: #e74c3c;
            background: #fadbd8;
        }
        .fill-box {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #f1f2f6;
            padding: 25px;
            border-radius: 12px;
        }
        .letter-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            text-transform: uppercase;
        }
        .letter-input:focus {
            border-color: #3498db;
            outline: none;
        }
        .fixed-letter {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            background: #3498db;
            color: white;
            border-radius: 8px;
        }
        .feedback {
            margin: 25px 0;
            padding: 20px;
            border-radius: 12px;
            background: #f8f9fa;
            border-left: 5px solid #3498db;
            display: none;
        }
        .feedback.show {
            display: block;
            animation: fadeIn 0.3s;
        }
        .feedback.correct-feedback {
            border-left-color: #27ae60;
            background: #e8f8f5;
        }
        .feedback.wrong-feedback {
            border-left-color: #e74c3c;
            background: #fdedec;
        }
        .feedback-title {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 5px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            background: #3498db;
            color: white;
            width: 100%;
            margin-top: 15px;
        }
        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .result-screen {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .result-screen.show {
            display: block;
        }
        .final-score {
            font-size: 4em;
            font-weight: bold;
            color: #3498db;
            margin: 20px 0;
        }
        .grade-message {
            font-size: 1.8em;
            margin: 30px 0;
            padding: 20px;
            border-radius: 15px;
            background: #f1f2f6;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 500px) {
            .letter-input, .fixed-letter {
                width: 40px;
                height: 40px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📘 Management Terminology Test</h1>
        <p>Multiple Choice · True/False · Word Bank · Letter Completion</p>
    </div>
    <div class="stats">
        <span class="score-box" id="scoreDisplay">Score: 0</span>
        <span class="q-counter" id="questionCounter">1 / 16</span>
    </div>
    <div class="main" id="mainArea">
        <!-- dynamic content -->
    </div>
    <div id="resultScreen" class="result-screen">
        <h2>Test Completed!</h2>
        <div class="final-score" id="finalScore">0</div>
        <div class="grade-message" id="gradeMessage"></div>
        <button class="btn" id="restartBtn">Restart Test</button>
    </div>
</div>

<script>
(function() {
    // ---------- QUESTION BANK (English, total 100 points) ----------
    const questions = [
        // MULTIPLE CHOICE (5 questions, 5 points each = 25)
        { type: 'MC', question: 'Which term refers to the process of coordinating resources to achieve organizational goals?',
          options: ['Management', 'Organizational Resources', 'Efficiency', 'Effectiveness'], answer: 0, points: 5,
          explanation: 'Management involves coordinating resources to achieve goals.' },
        { type: 'MC', question: 'Doing things right, such as completing recruitment quickly, is called?',
          options: ['Efficiency', 'Effectiveness', 'Scientific Nature', 'Artistic Nature'], answer: 0, points: 5,
          explanation: 'Efficiency focuses on doing things right (minimizing waste/time).' },
        { type: 'MC', question: 'Which management function involves setting goals and making plans?',
          options: ['Planning', 'Organizing', 'Leading', 'Controlling'], answer: 0, points: 5,
          explanation: 'Planning is the function of setting objectives and deciding how to achieve them.' },
        { type: 'MC', question: 'Motivating and guiding people is the essence of which function?',
          options: ['Leading', 'Controlling', 'Planning', 'Organizing'], answer: 0, points: 5,
          explanation: 'Leading involves directing and motivating employees.' },
        { type: 'MC', question: 'What does "Organizational Resources" include?',
          options: ['Assets like human talent', 'Only financial assets', 'Management activities', 'Goals and objectives'], answer: 0, points: 5,
          explanation: 'Organizational resources encompass all assets, especially human talent.' },

        // TRUE/FALSE (6 questions, 5 points each = 30)
        { type: 'TF', question: 'Efficiency means doing the right things to achieve goals.',
          options: ['True', 'False'], answer: 1, points: 5,
          explanation: 'False. Efficiency is doing things right; effectiveness is doing the right things.' },
        { type: 'TF', question: 'Management is both a science and an art.',
          options: ['True', 'False'], answer: 0, points: 5,
          explanation: 'True. It has scientific principles and requires artistic flexibility.' },
        { type: 'TF', question: 'The controlling function involves setting goals and making plans.',
          options: ['True', 'False'], answer: 1, points: 5,
          explanation: 'False. Controlling monitors performance and corrects deviations.' },
        { type: 'TF', question: 'Organizational resources include only physical assets.',
          options: ['True', 'False'], answer: 1, points: 5,
          explanation: 'False. They include human, financial, physical, and informational resources.' },
        { type: 'TF', question: 'Innovation is one of the five core management functions.',
          options: ['True', 'False'], answer: 0, points: 5,
          explanation: 'True. The five functions are planning, organizing, leading, controlling, and innovating.' },
        { type: 'TF', question: 'The planning function is about structuring resources and roles.',
          options: ['True', 'False'], answer: 1, points: 5,
          explanation: 'False. Organizing is about structuring resources and roles.' },

        // WORD BANK (Fill-in-the-blank with given options) (4 questions, 5 points each = 20)
        { type: 'WB', question: 'The HR department’s annual training plan is an example of the __________ function.',
          options: ['planning', 'organizing', 'leading', 'controlling'], answer: 0, points: 5,
          explanation: 'Planning involves setting goals and creating plans.' },
        { type: 'WB', question: 'Designing the HR three-pillar model is part of the __________ function.',
          options: ['planning', 'organizing', 'leading', 'controlling'], answer: 1, points: 5,
          explanation: 'Organizing structures resources and roles.' },
        { type: 'WB', question: 'Employee incentive programs are used in the __________ function.',
          options: ['planning', 'organizing', 'leading', 'controlling'], answer: 2, points: 5,
          explanation: 'Leading motivates and guides people.' },
        { type: 'WB', question: 'Reviewing recruitment quality is an example of the __________ function.',
          options: ['planning', 'organizing', 'leading', 'controlling'], answer: 3, points: 5,
          explanation: 'Controlling monitors performance and corrects issues.' },

        // LETTER COMPLETION (2 questions, 10 points each = 20)
        { type: 'LC', question: 'Complete the word: M _ n _ g _ m _ n t (management)',
          answer: 'management', points: 10,
          pattern: ['M', '_', 'n', '_', 'g', '_', 'm', '_', 'n', 't'],
          missing: [1,3,5,7],
          explanation: 'The correct spelling is "management".' },
        { type: 'LC', question: 'Complete the word: _ f f _ c _ _ n c _ (efficiency)',
          answer: 'efficiency', points: 10,
          pattern: ['_', 'f', 'f', '_', 'c', '_', '_', 'n', 'c', '_'],
          missing: [0,3,5,6,9],
          explanation: 'The correct spelling is "efficiency".' }
    ];

    let currentIndex = 0;
    let score = 0;
    const totalQuestions = questions.length;
    let answered = false;
    let autoTimer = null;

    const mainArea = document.getElementById('mainArea');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const questionCounter = document.getElementById('questionCounter');
    const resultScreen = document.getElementById('resultScreen');
    const finalScore = document.getElementById('finalScore');
    const gradeMessage = document.getElementById('gradeMessage');
    const restartBtn = document.getElementById('restartBtn');

    function updateScore() {
        scoreDisplay.textContent = `Score: ${score}`;
    }

    function updateCounter() {
        questionCounter.textContent = `${currentIndex+1} / ${totalQuestions}`;
    }

    function clearTimer() {
        if (autoTimer) {
            clearTimeout(autoTimer);
            autoTimer = null;
        }
    }

    function loadQuestion() {
        clearTimer();
        answered = false;
        const q = questions[currentIndex];
        let html = `<div class="question-text">${q.question}</div>`;

        if (q.type === 'MC' || q.type === 'TF' || q.type === 'WB') {
            html += `<div class="options-area" id="optionsArea">`;
            q.options.forEach((opt, idx) => {
                html += `<div class="option-btn" data-opt-index="${idx}">${opt}</div>`;
            });
            html += `</div>`;
        } else if (q.type === 'LC') {
            html += `<div class="fill-box" id="fillBox">`;
            q.pattern.forEach((ch, idx) => {
                if (ch === '_') {
                    html += `<input type="text" class="letter-input" maxlength="1" data-pos="${idx}">`;
                } else {
                    html += `<span class="fixed-letter">${ch}</span>`;
                }
            });
            html += `</div>`;
        }

        html += `<div class="feedback" id="feedbackArea"><div class="feedback-title" id="feedbackTitle"></div><div class="feedback-text" id="feedbackText"></div></div>`;
        html += `<button class="btn" id="submitBtn">Submit Answer</button>`;

        mainArea.innerHTML = html;

        // Event listeners for option clicks (MC/TF/WB)
        if (q.type === 'MC' || q.type === 'TF' || q.type === 'WB') {
            const optBtns = document.querySelectorAll('.option-btn');
            optBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (answered) return;
                    optBtns.forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        // Submit button
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.addEventListener('click', function() {
            if (answered) return;
            const q = questions[currentIndex];
            let userAnswer = null;
            let isCorrect = false;

            if (q.type === 'MC' || q.type === 'TF' || q.type === 'WB') {
                const selected = document.querySelector('.option-btn.selected');
                if (!selected) {
                    alert('Please select an option.');
                    return;
                }
                userAnswer = parseInt(selected.dataset.optIndex);
                isCorrect = (userAnswer === q.answer);
            } else if (q.type === 'LC') {
                const inputs = document.querySelectorAll('.letter-input');
                let userWord = '';
                inputs.forEach(input => userWord += input.value.toLowerCase());
                isCorrect = (userWord === q.answer.toLowerCase());
            }

            answered = true;
            submitBtn.disabled = true;

            // Show feedback
            const feedback = document.getElementById('feedbackArea');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackText = document.getElementById('feedbackText');
            feedback.classList.add('show');
            if (isCorrect) {
                score += q.points;
                updateScore();
                feedback.classList.add('correct-feedback');
                feedback.classList.remove('wrong-feedback');
                feedbackTitle.textContent = '✅ Correct!';
            } else {
                feedback.classList.add('wrong-feedback');
                feedback.classList.remove('correct-feedback');
                feedbackTitle.textContent = '❌ Incorrect';
            }
            feedbackText.textContent = q.explanation || (q.type==='LC'?`Correct spelling: ${q.answer}`:'');

            // Highlight correct/wrong for choice questions
            if (q.type !== 'LC') {
                const optBtns = document.querySelectorAll('.option-btn');
                optBtns.forEach((btn, idx) => {
                    btn.classList.remove('selected');
                    if (idx === q.answer) btn.classList.add('correct');
                    else if (idx === userAnswer && !isCorrect) btn.classList.add('wrong');
                });
            }

            // Auto move to next question after 2 seconds
            clearTimer();
            autoTimer = setTimeout(() => {
                if (currentIndex < totalQuestions - 1) {
                    currentIndex++;
                    loadQuestion();
                    updateCounter();
                } else {
                    showResult();
                }
            }, 2000);
        });
    }

    function showResult() {
        clearTimer();
        mainArea.style.display = 'none';
        resultScreen.classList.add('show');
        finalScore.textContent = `${score} / 100`;
        const percentage = score;
        let grade = '';
        if (percentage >= 90) grade = '🏆 Excellent! You have mastered management terminology!';
        else if (percentage >= 75) grade = '👍 Good job, keep it up!';
        else if (percentage >= 60) grade = '📚 Pass, but need more review.';
        else grade = '💪 Keep practicing, try again!';
        gradeMessage.textContent = grade;
    }

    restartBtn.addEventListener('click', function() {
        currentIndex = 0;
        score = 0;
        updateScore();
        mainArea.style.display = 'block';
        resultScreen.classList.remove('show');
        loadQuestion();
        updateCounter();
    });

    // Initialize
    loadQuestion();
    updateScore();
})();
</script>
</body>
</html>
</html>
